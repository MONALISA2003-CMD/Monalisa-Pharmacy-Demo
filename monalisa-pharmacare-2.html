        const name = $('ncN').value.trim(); if (!name){ toast('A name is needed first.','critical','x'); return; }
        const id = 'CUS-'+(2000+DB.customers.length+1);
        DB.customers.unshift({ id, name, phone:$('ncPh').value||'—', email:$('ncEm').value||'—', joined:'2026-06-19', loyaltyPoints:0, totalSpent:0, branch:DB.bid==='ALL'?'BR-001':DB.bid, tier:'Bronze', lastVisit:'2026-06-19' });
        closeDialog(); render();
        toast(`${name} is on file now.`,'good','users');
      });
    });
  }

  function wireSup(){
    mount.querySelectorAll('[data-viewsup]').forEach(b=>b.addEventListener('click', ()=>{
      const s = DB.suppliers.find(x=>x.id===b.dataset.viewsup); if (!s) return;
      const hist = DB.purchaseOrders.filter(p=>p.sid===s.id);
      openDialog(`<div class="dlg-h"><span class="dlg-title">${esc(s.name)}</span></div>
        <div class="dlg-b">
          <div class="fgrid mb3"><div><div class="flbl">Contact</div><div style="font-size:13px;margin-top:3px;">${esc(s.contact)}</div></div><div><div class="flbl">Email</div><div style="font-size:13px;margin-top:3px;">${esc(s.email)}</div></div></div>
          ${hist.length ? dataTable(['Order','Total','Status'], hist.map(p=>`<tr><td class="fmono">${p.id}</td><td class="num fmono">${DB.fc(p.total)}</td><td>${statusTag(p.status)}</td></tr>`).join('')) : `<p class="dim" style="font-size:12.5px;">No orders placed with them yet.</p>`}
        </div>
        <div class="dlg-f"><button class="btn btn-primary" id="dlgCancel">Close</button></div>`);
    }));
    mount.querySelectorAll('[data-newsuppo]').forEach(b=>b.addEventListener('click', ()=>{ nav('procurement'); setTimeout(()=>$('newPOBtn')&&$('newPOBtn').click(),100); }));
  }

  function wireBr(){
    mount.querySelectorAll('[data-switchbr]').forEach(b=>b.addEventListener('click', ()=>{
      DB.setBranch(b.dataset.switchbr);
      document.querySelector('.nb-label').textContent = DB.branchName(b.dataset.switchbr);
      toast(`Switched to ${DB.branchName(b.dataset.switchbr)}.`,'good','sitemap');
      nav('dashboard');
    }));
    mount.querySelectorAll('[data-brana]').forEach(b=>b.addEventListener('click', ()=>{
      DB.setBranch(b.dataset.brana);
      document.querySelector('.nb-label').textContent = DB.branchName(b.dataset.brana);
      nav('analytics');
    }));
  }

  function wireFinanceView(){ const e=$('exportFinBtn'); if (e) e.addEventListener('click', ()=> toast('Building the financial export…','info','download')); }
  function wireReportsView(){ const g=$('genReportBtn'); if (g) g.addEventListener('click', ()=> toast('Your report is generating — it will be ready shortly.','good','fileChart')); }

  /* ---------------- SHELL CHROME ---------------- */
  function wireShellChrome(){
    document.body.addEventListener('click', e=>{
      const item = e.target.closest('.nitem'); if (item){ nav(item.dataset.mod); }
      const bnav = e.target.closest('.bnav-btn[data-mod]'); if (bnav){ nav(bnav.dataset.mod); }
      const settingsBtn = e.target.closest('.nf-btn[data-mod]'); if (settingsBtn){ nav(settingsBtn.dataset.mod); }
    });
    document.body.addEventListener('keydown', e=>{
      const item = e.target.closest('.nitem');
      if (item && (e.key==='Enter'||e.key===' ')){ e.preventDefault(); nav(item.dataset.mod); }
    });

    $('navCollapse').addEventListener('click', ()=> $('navEl').classList.toggle('coll'));
    $('hamburgerBtn').addEventListener('click', ()=>{ $('navEl').classList.add('mob-open'); $('navBackdrop').classList.add('on'); });
    $('navBackdrop').addEventListener('click', closeMobNav);
    $('bnavMore').addEventListener('click', ()=>{ $('navEl').classList.add('mob-open'); $('navBackdrop').classList.add('on'); });

    $('themeBtn').addEventListener('click', ()=>{
      const t = document.documentElement.dataset.theme==='dark' ? 'light' : 'dark';
      document.documentElement.setAttribute('data-theme', t);
      $('themeBtn').innerHTML = t==='dark' ? ic('sun') : ic('moon');
    });

    /* branch dropdown */
    const branchDrop = $('branchDrop');
    $('branchBtn').addEventListener('click', e=>{
      e.stopPropagation();
      let h = `<div class="ddhead">Switch branch</div><div class="dditem${DB.bid==='ALL'?' on':''}" data-bs="ALL"><span class="dddot" style="background:var(--gold)"></span>All branches, consolidated</div>`;
      DB.branches.forEach(b=>{ h += `<div class="dditem${DB.bid===b.id?' on':''}" data-bs="${b.id}"><span class="dddot" style="background:${b.status==='active'?'var(--good)':'var(--caution)'}"></span>${esc(b.name)}</div>`; });
      branchDrop.innerHTML = h;
      const r = $('branchBtn').getBoundingClientRect();
      branchDrop.style.top = (r.bottom+6)+'px'; branchDrop.style.left = r.left+'px';
      branchDrop.classList.toggle('on');
    });
    document.addEventListener('click', e=>{ if (!branchDrop.contains(e.target) && e.target!==$('branchBtn')) branchDrop.classList.remove('on'); });
    branchDrop.addEventListener('click', e=>{
      const el = e.target.closest('[data-bs]'); if (!el) return;
      DB.setBranch(el.dataset.bs);
      document.querySelector('.nb-label').textContent = el.dataset.bs==='ALL' ? 'All branches' : DB.branchName(el.dataset.bs);
      branchDrop.classList.remove('on');
      toast(`Now looking at ${el.dataset.bs==='ALL'?'all branches':DB.branchName(el.dataset.bs)}.`,'good','sitemap');
      render();
    });

    /* search */
    const gsi=$('gSearchInput'), sd=$('searchDrop');
    let sdTimer;
    gsi.addEventListener('input', e=>{
      clearTimeout(sdTimer);
      sdTimer = setTimeout(()=>{
        const q = e.target.value.trim().toLowerCase();
        if (q.length<2){ sd.classList.remove('on'); return; }
        const res = [];
        DB.medicines.filter(m=>m.name.toLowerCase().includes(q)||m.barcode.includes(q)).slice(0,3).forEach(m=>res.push({tag:'Medicine', name:`${m.name} ${m.strength}`, sub:`${m.category} · ${DB.fc(m.sellPrice)}`, go:()=>nav('inventory')}));
        DB.customers.filter(c=>c.name.toLowerCase().includes(q)||c.phone.includes(q)).slice(0,3).forEach(c=>res.push({tag:'Customer', name:c.name, sub:`${c.phone} · ${c.tier}`, go:()=>{ nav('customers'); setTimeout(()=>{ const b=mount.querySelector(`[data-viewcust="${c.id}"]`); if (b) b.click(); },120); }}));
        DB.prescriptions.filter(p=>p.patient.toLowerCase().includes(q)||p.id.toLowerCase().includes(q)).slice(0,2).forEach(p=>res.push({tag:'Prescription', name:`${p.id} — ${p.patient}`, sub:p.status.replace(/-/g,' '), go:()=>{ nav('prescriptions'); setTimeout(()=>openRxDialog(p.id),120); }}));
        DB.suppliers.filter(s=>s.name.toLowerCase().includes(q)).slice(0,2).forEach(s=>res.push({tag:'Supplier', name:s.name, sub:s.category, go:()=>nav('suppliers')}));
        DB.purchaseOrders.filter(p=>p.id.toLowerCase().includes(q)||p.supplier.toLowerCase().includes(q)).slice(0,2).forEach(p=>res.push({tag:'Order', name:p.id, sub:`${p.supplier} · ${DB.fc(p.total)}`, go:()=>nav('procurement')}));
        DB.branches.filter(b=>b.name.toLowerCase().includes(q)).slice(0,2).forEach(b=>res.push({tag:'Branch', name:b.name, sub:b.city, go:()=>nav('branches')}));
        sd._res = res;
        sd.innerHTML = res.length ? res.map((r,i)=>`<div class="sr" data-ri="${i}"><span class="sr-tag">${r.tag}</span><div><div class="sr-name">${esc(r.name)}</div><div class="sr-sub">${esc(r.sub)}</div></div></div>`).join('') : `<div style="padding:22px;text-align:center;color:var(--text-faint);font-size:13px;">Nothing turns up for "${esc(q)}"</div>`;
        sd.classList.add('on');
      }, 140);
    });
    sd.addEventListener('click', e=>{ const el=e.target.closest('[data-ri]'); if (!el) return; const res=sd._res; if (res&&res[+el.dataset.ri]){ res[+el.dataset.ri].go(); gsi.value=''; sd.classList.remove('on'); } });
    document.addEventListener('click', e=>{ if (!$('gsearchBox').contains(e.target)) sd.classList.remove('on'); });
    document.addEventListener('keydown', e=>{ if ((e.metaKey||e.ctrlKey)&&e.key==='k'){ e.preventDefault(); gsi.focus(); } if (e.key==='Escape'){ sd.classList.remove('on'); closeDialog(); } });

    /* notifications */
    $('notifBtn').addEventListener('click', ()=>{
      $('notifBody').innerHTML = DB.notifications.map(n=>`<div class="nrow${n.unread?' unread':''}"><div class="nrow-ico tone-${n.tone}">${ic(n.icon)}</div><div><div class="nrow-title">${esc(n.title)}</div><div class="nrow-desc">${esc(n.desc)}</div><div class="nrow-time">${esc(n.time)}</div></div></div>`).join('');
      openPanel($('notifPanel'));
    });
    $('notifClose').addEventListener('click', ()=>closePanel($('notifPanel')));

    /* AI */
    const aiPanel=$('aiPanel'), aiMsgs=$('aiMsgs'), aiInput=$('aiInput'), aiChips=$('aiChips');
    const chips = ['Forecast next month\'s demand','What needs reordering?','How did today go?','What\'s close to expiring?','Suggest a purchasing plan'];
    function renderChips(){ aiChips.innerHTML = chips.map(c=>`<div class="ai-chip" data-cp="${esc(c)}">${esc(c)}</div>`).join(''); }
    function addMsg(role, html){ const d=document.createElement('div'); d.className=`ai-msg ${role}`; d.innerHTML = role==='b' ? `<div class="ai-msg-lbl">Mona</div>${html}` : esc(html); aiMsgs.appendChild(d); aiMsgs.scrollTop = aiMsgs.scrollHeight; }
    function aiAnswer(q){
      const ql = q.toLowerCase(), bid = DB.bid;
      if (ql.includes('forecast')||ql.includes('demand')) return `Antimalarial demand tends to climb about 14% as the rains set in — worth carrying roughly 180 extra units of Coartem across the branches over the next few weeks before the curve turns.`;
      if (ql.includes('reorder')||ql.includes('restock')||ql.includes('low')){ const low=DB.lowStock(bid); return low.length ? `${low.length} line${low.length>1?'s need':' needs'} attention: ${low.slice(0,4).map(m=>`<strong>${esc(m.name)}</strong> (${DB.getStock(m,bid)} left)`).join(', ')}. There's a ready-made suggestion sitting in Inventory's Worth Reordering tab.` : `Everything is sitting above its reorder point right now — nothing urgent on the shelf.`; }
      if (ql.includes('today')||ql.includes('how did')||ql.includes('perform')){ const t=DB.sales.filter(s=>s.date.startsWith('2026-06-19')); const tot=t.reduce((s,x)=>s+x.total,0); return `${t.length} sale${t.length!==1?'s':''} so far today, totalling <strong>${DB.fc(tot)}</strong>. Prescription approvals are keeping pace with the queue.`; }
      if (ql.includes('expir')){ const e=DB.expiringWithin(90,bid); return e.length ? `${e.length} batch${e.length>1?'es are':' is'} due within 90 days — ${e.slice(0,3).map(m=>esc(m.name)).join(', ')} among them. Worth pushing these forward under the first-expiry-first-out rule before they tip into write-off territory.` : `Nothing is closing in on its expiry window in the next 90 days.`; }
      if (ql.includes('purchas')||ql.includes('order')){ const pa=DB.purchaseOrders.filter(p=>p.status==='pending-approval'); return `${pa.length} order${pa.length!==1?'s are':' is'} waiting on a signature, worth ${DB.fc(pa.reduce((s,p)=>s+p.total,0))} altogether. Ibuprofen and Metformin are both worth adding to the next order — they're trending toward their reorder points.`; }
      return `I can help most with stock levels, expiry windows, today's sales, or what's worth reordering — ask me about any of those and I'll pull the real numbers.`;
    }
    function sendAi(){
      const t = aiInput.value.trim(); if (!t) return;
      addMsg('u', t); aiInput.value=''; aiChips.innerHTML='';
      const typing = document.createElement('div'); typing.className='ai-msg b';
      typing.innerHTML = `<div class="ai-msg-lbl">Mona</div><div class="ai-typing"><span></span><span></span><span></span></div>`;
      aiMsgs.appendChild(typing); aiMsgs.scrollTop = aiMsgs.scrollHeight;
      setTimeout(()=>{ typing.remove(); addMsg('b', aiAnswer(t)); renderChips(); }, 620);
    }
    $('aiBtn').addEventListener('click', ()=>{
      openPanel(aiPanel);
      if (!aiMsgs.children.length){ addMsg('b', `Morning. I can read the live numbers across whichever branch you're looking at — ask me about stock, expiry risk, today's sales, or what's worth ordering next.`); renderChips(); }
    });
    $('aiClose').addEventListener('click', ()=>closePanel(aiPanel));
    $('aiSend').addEventListener('click', sendAi);
    aiInput.addEventListener('keydown', e=>{ if (e.key==='Enter') sendAi(); });
    aiChips.addEventListener('click', e=>{ const c=e.target.closest('[data-cp]'); if (c){ aiInput.value=c.dataset.cp; sendAi(); } });
    $('scrim').addEventListener('click', ()=>{ closePanel($('notifPanel')); closePanel(aiPanel); });
  }

  function closeMobNav(){ $('navEl').classList.remove('mob-open'); $('navBackdrop').classList.remove('on'); }
  function openPanel(el){ el.classList.add('on'); $('scrim').classList.add('on'); }
  function closePanel(el){ el.classList.remove('on'); $('scrim').classList.remove('on'); }

  function updateMobileBadges(){
    const pending = DB.prescriptions.filter(p=>p.status==='pending-review').length;
    const low = DB.lowStock(DB.bid).length;
    const rxB = $('rxBadge'); if (rxB){ rxB.style.display = pending>0?'inline-flex':'none'; rxB.textContent = pending; }
    const invB = $('invBadge'); if (invB){ invB.style.display = low>0?'inline-flex':'none'; invB.textContent = low; invB.classList.toggle('b-accent', true); }
    const flag = $('bnavRxFlag'); if (flag) flag.style.display = pending>0?'block':'none';
  }

  /* ---------------- DIALOG / TOAST ---------------- */
  function openDialog(html){
    $('dlg').innerHTML = html;
    $('dlgScrim').classList.add('on');
    const c = $('dlgCancel'); if (c) c.addEventListener('click', closeDialog);
  }
  function closeDialog(){ $('dlgScrim').classList.remove('on'); $('dlg').innerHTML=''; }
  document.addEventListener('DOMContentLoaded', ()=>{
    document.getElementById('dlgScrim') && document.getElementById('dlgScrim').addEventListener('click', e=>{ if (e.target.id==='dlgScrim') closeDialog(); });
  });

  const toastIcons = { good:'checkCircle', caution:'clock', critical:'x', info:'sparkle' };
  function toast(msg, tone, icon){
    tone = tone || 'info';
    const t = document.createElement('div');
    t.className = `toast t-${tone}`;
    t.innerHTML = `<span class="toast-icon">${ic(icon||toastIcons[tone]||'sparkle')}</span><span>${esc(msg)}</span>`;
    $('toasts').appendChild(t);
    setTimeout(()=>{ t.classList.add('out'); setTimeout(()=>t.remove(),200); }, 3600);
  }

  /* ---------------- GATE / LOGIN ---------------- */
  function wireGate(){
    const submit = $('gateSubmit');
    submit.addEventListener('click', ()=>{
      const email = $('gateEmail').value.trim().toLowerCase();
      const account = accounts[email] || accounts['amara.mukasa@monalisapharma.com'];
      DB.setUser(account);
      submit.disabled = true;
      submit.innerHTML = `<span class="spin" style="width:16px;height:16px;border-width:2px;"></span><span>Opening the floor…</span>`;
      setTimeout(()=>{
        $('gate').classList.add('leaving');
        setTimeout(()=>{ $('gate').remove(); startApp(); }, 480);
      }, 520);
    });
    $('gatePass').addEventListener('keydown', e=>{ if (e.key==='Enter') submit.click(); });
  }

  /* ---------------- BOOT ---------------- */
  buildShell();
  wireGate();

})();

</script>
</body>
</html>
